<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="theme-color" content="#1D9E75" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Quest Board" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Summer Quest Board</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f4f3ef;
    --surface:   #ffffff;
    --surface2:  #f9f8f5;
    --border:    rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text:      #1a1a18;
    --text-sec:  #5a5a56;
    --text-muted:#8e8e89;
    --radius:    8px;
    --green:     #1D9E75;
    --green-bg:  #E1F5EE;
    --green-txt: #0F6E56;
    --blue-bg:   #E6F1FB;
    --blue-txt:  #185FA5;
    --amber-bg:  #FAEEDA;
    --amber-txt: #854F0B;
    --purple-bg: #EEEDFE;
    --purple-txt:#534AB7;
    --red-txt:   #A32D2D;
    --red-border:#F09595;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #1a1a18;
      --surface:   #26261f;
      --surface2:  #2e2e26;
      --border:    rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.18);
      --text:      #f0efe9;
      --text-sec:  #a8a89f;
      --text-muted:#6a6a62;
      --green-bg:  #0a3326;
      --green-txt: #5DCAA5;
      --blue-bg:   #0a1f3a;
      --blue-txt:  #85B7EB;
      --amber-bg:  #2e1e06;
      --amber-txt: #EF9F27;
      --purple-bg: #1a1540;
      --purple-txt:#AFA9EC;
      --red-txt:   #F09595;
      --red-border:#7A2020;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.25rem 1rem 5rem;
    -webkit-text-size-adjust: 100%;
  }

  body[data-theme="light"] {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-sec: #5a5a56;
    --text-muted: #8e8e89;
    --green-bg: #E1F5EE;
    --green-txt: #0F6E56;
    --blue-bg: #E6F1FB;
    --blue-txt: #185FA5;
    --amber-bg: #FAEEDA;
    --amber-txt: #854F0B;
    --purple-bg: #EEEDFE;
    --purple-txt: #534AB7;
    --red-txt: #A32D2D;
    --red-border: #F09595;
  }

  body[data-theme="dark"] {
    --bg: #1a1a18;
    --surface: #26261f;
    --surface2: #2e2e26;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    --text: #f0efe9;
    --text-sec: #a8a89f;
    --text-muted: #6a6a62;
    --green-bg: #0a3326;
    --green-txt: #5DCAA5;
    --blue-bg: #0a1f3a;
    --blue-txt: #85B7EB;
    --amber-bg: #2e1e06;
    --amber-txt: #EF9F27;
    --purple-bg: #1a1540;
    --purple-txt: #AFA9EC;
    --red-txt: #F09595;
    --red-border: #7A2020;
  }

  .app { max-width: 960px; margin: 0 auto; }

  /* header */
  .header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem; gap: 10px;
  }
  h1 { font-size: 22px; font-weight: 600; }
  .header-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .icon-btn {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 6px 10px;
    font-size: 15px; cursor: pointer; color: var(--text-muted);
    line-height: 1; min-height: 36px; min-width: 36px;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:active { background: var(--surface2); }

  /* grade card */
  .grade-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  .grade-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 0.75rem 1rem;
    display: flex; flex-direction: column; gap: 3px;
  }
  .grade-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .grade-value { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1; }
  .grade-sub   { font-size: 11px; color: var(--text-sec); }
  .grade-letter { font-size: 24px; font-weight: 700; }
  .grade-A  { color: var(--green); }
  .grade-B  { color: var(--blue-txt); }
  .grade-C  { color: var(--amber-txt); }
  .grade-D  { color: #c0603a; }
  .grade-F  { color: var(--red-txt); }
  .extra-credit { font-size: 12px; color: var(--purple-txt); font-weight: 500; }

  /* tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .tab {
    padding: 8px 18px; border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: transparent; font-size: 14px; font-weight: 500;
    color: var(--text-sec); cursor: pointer; transition: all 0.15s;
    min-height: 44px;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .tab:hover:not(.active) { background: var(--surface); }

  /* main layout */
  .main-layout { display: flex; gap: 10px; align-items: flex-start; }
  .columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; flex: 1; min-width: 0; }

  /* section */
  .section {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 1rem;
  }
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.75rem; padding-bottom: 0.75rem;
    border-bottom: 0.5px solid var(--border);
  }
  .section-title { font-size: 15px; font-weight: 500; }
  .countdown {
    font-size: 12px; font-weight: 500; padding: 3px 8px;
    border-radius: 20px; white-space: nowrap;
  }
  .cd-daily   { background: var(--green-bg);  color: var(--green-txt); }
  .cd-weekly  { background: var(--blue-bg);   color: var(--blue-txt);  }
  .cd-monthly { background: var(--amber-bg);  color: var(--amber-txt); }
  .cd-side    { background: var(--purple-bg); color: var(--purple-txt);}

  /* quest cards */
  .quest-card {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 0.65rem 0.75rem;
    margin-bottom: 0.5rem; display: flex; align-items: center;
    gap: 10px; cursor: pointer; transition: border-color 0.15s;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .quest-card:last-child { margin-bottom: 0; }
  .quest-card:hover { border-color: var(--border-strong); }
  .quest-card:active { border-color: var(--border-strong); }
  .quest-card.done { opacity: 0.5; cursor: default; }
  .quest-card.done .quest-text { text-decoration: line-through; color: var(--text-muted); }
  .quest-check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 13px; background: transparent;
    transition: all 0.2s;
  }
  .quest-card.done .quest-check {
    background: var(--green); border-color: var(--green); color: #fff;
  }
  .quest-text { font-size: 13px; flex: 1; line-height: 1.4; color: var(--text); }
  .quest-xp {
    font-size: 11px; font-weight: 500; padding: 2px 7px;
    border-radius: 10px; flex-shrink: 0; white-space: nowrap;
  }
  .xp-daily   { background: var(--green-bg);  color: var(--green-txt); }
  .xp-weekly  { background: var(--blue-bg);   color: var(--blue-txt);  }
  .xp-monthly { background: var(--amber-bg);  color: var(--amber-txt); }
  .xp-side    { background: var(--purple-bg); color: var(--purple-txt);}

  /* side grid */
  .side-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem;
    align-items: start;
  }
  .pool-info { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  /* side quest animations */
  @keyframes fadeSlideOut { from { opacity:1; transform:translateX(0);    } to { opacity:0; transform:translateX(14px);  } }
  @keyframes fadeSlideIn  { from { opacity:0; transform:translateX(-14px);} to { opacity:1; transform:translateX(0);     } }

  /* debug drawer */
  .debug-drawer {
    position: fixed; top: 0; right: 0; height: 100%;
    width: min(280px, 85vw);
    background: var(--surface);
    border-left: 0.5px solid var(--border);
    padding: 1.25rem 1rem 2rem;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 200;
    overflow-y: auto;
  }
  .debug-drawer.open { transform: translateX(0); }
  .debug-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 199;
  }
  .debug-overlay.open { display: block; }
  .debug-drawer h3 {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 1rem; padding-bottom: 0.5rem;
    border-bottom: 0.5px solid var(--border);
  }
  .debug-section-label {
    font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 14px;
  }
  .debug-btn {
    display: block; width: 100%; text-align: left;
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px; font-size: 13px;
    color: var(--text-sec); cursor: pointer; margin-bottom: 6px;
    min-height: 44px;
    -webkit-tap-highlight-color: transparent;
  }
  .debug-btn:active { border-color: var(--border-strong); color: var(--text); }
  .debug-btn:last-child { margin-bottom: 0; }
  .debug-btn.danger { color: var(--red-txt); border-color: var(--red-border); }
  .debug-close {
    position: absolute; top: 12px; right: 12px;
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 50%; width: 32px; height: 32px;
    font-size: 16px; cursor: pointer; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
  }

  /* toast */
  .toast {
    position: fixed; bottom: 24px;
    left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--surface);
    padding: 10px 20px; border-radius: 24px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 999;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .toast.show { opacity: 1; }


  /* ── daily tasks ── */
  .task-card {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 0.65rem 0.75rem;
    margin-bottom: 0.5rem; display: flex; align-items: center;
    gap: 10px; transition: border-color 0.15s;
    min-height: 48px;
  }
  .task-card.done { opacity: 0.5; }
  .task-card.done .task-text { text-decoration: line-through; color: var(--text-muted); }
  .task-check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 13px; background: transparent;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .task-card.done .task-check {
    background: var(--green); border-color: var(--green); color: #fff;
  }
  .task-text {
    font-size: 14px; flex: 1; line-height: 1.4; color: var(--text);
    word-break: break-word;
  }
  .task-delete {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 18px; padding: 4px 6px;
    border-radius: 6px; flex-shrink: 0; line-height: 1;
    -webkit-tap-highlight-color: transparent; min-width: 32px; min-height: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .task-delete:active { color: var(--red-txt); background: var(--surface); }
  .add-task-row {
    display: flex; gap: 8px; margin-top: 0.75rem; align-items: center;
  }
  .add-task-input {
    flex: 1; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
    font-size: 14px; color: var(--text); outline: none;
    font-family: inherit; min-height: 44px;
    transition: border-color 0.15s;
  }
  .add-task-input:focus { border-color: var(--green); }
  .add-task-input::placeholder { color: var(--text-muted); }
  .add-task-btn {
    background: var(--green); border: none; border-radius: var(--radius);
    color: #fff; font-size: 22px; font-weight: 300; cursor: pointer;
    width: 44px; height: 44px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: opacity 0.15s;
  }
  .add-task-btn:active { opacity: 0.8; }
  .tasks-empty {
    text-align: center; color: var(--text-muted); font-size: 14px;
    padding: 2rem 1rem; line-height: 1.6;
  }

  /* hover only on real pointer devices */
  @media (hover: hover) {
    .quest-card:hover { border-color: var(--border-strong); }
    .tab:hover:not(.active) { background: var(--surface); }
    .debug-btn:hover { border-color: var(--border-strong); color: var(--text); }
  }
  /* tablet */
  @media (max-width: 720px) {
    .columns { grid-template-columns: 1fr; }
    .main-layout { flex-direction: column; }
    .grade-row { grid-template-columns: repeat(2, 1fr); }
  }
  /* phone */
  @media (max-width: 480px) {
    body { padding: 1rem 0.75rem 5rem; }
    h1 { font-size: 19px; }
    .grade-row { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .grade-card { padding: 0.6rem 0.75rem; }
    .grade-value, .grade-letter { font-size: 20px; }
    .side-grid { grid-template-columns: 1fr; }
    .quest-text { font-size: 14px; }
    .section { padding: 0.875rem; }
    .tab { font-size: 13px; padding: 8px 14px; }
    .section-title { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Summer Quest Board</h1>
    <div class="header-actions">
      <button class="icon-btn" id="themeIconBtn" onclick="toggleLightMode()" title="Toggle theme">☀️</button>
      <button class="icon-btn" onclick="openDebug()" title="Debug">🛠</button>
    </div>
  </div>

  <!-- grade row -->
  <div class="grade-row" id="gradeRow"></div>

  <!-- tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setTab('main')">Main Quests</button>
    <button class="tab" onclick="setTab('side')">Side Quests</button>
    <button class="tab" onclick="setTab('tasks')">Daily Tasks</button>
  </div>

  <!-- main view -->
  <div id="mainView">
    <div class="main-layout">
      <div class="columns" id="mainCols"></div>

    </div>
  </div>

  <!-- side view -->
  <div id="sideView" style="display:none">
    <div class="section">
      <div class="section-header">
        <span class="section-title">Side Quests</span>
        <span class="countdown cd-side">Complete one to unlock the next</span>
      </div>
      <div class="side-grid" id="sideGrid"></div>
      <p class="pool-info" id="sidePoolInfo"></p>
    </div>
  </div>
</div>


<!-- daily tasks view -->
<div id="tasksView" style="display:none">
  <div class="section">
    <div class="section-header">
      <span class="section-title">Daily Tasks</span>
      <span class="countdown cd-daily" id="tasksCountdown">⏱ --</span>
    </div>

    <div id="tasksList"></div>

    <div class="add-task-row">
      <input
        class="add-task-input"
        id="taskInput"
        type="text"
        placeholder="Add a task... (e.g. Brush teeth)"
        maxlength="80"
        onkeydown="if(event.key==='Enter') addTask()"
      />
      <button class="add-task-btn" onclick="addTask()">+</button>
    </div>

    <p class="pool-info" id="tasksInfo"></p>
  </div>
</div>

<!-- debug drawer -->
<div class="debug-overlay" id="debugOverlay" onclick="closeDebug()"></div>
<div class="debug-drawer" id="debugDrawer">
  <button class="debug-close" onclick="closeDebug()">✕</button>
  <h3>🛠 Debug Panel</h3>
  <div class="debug-section-label">Skip timers</div>
  <button class="debug-btn" onclick="skipTo('daily')">⏩ Daily reset in 5s</button>
  <button class="debug-btn" onclick="skipTo('weekly')">⏩ Weekly reset in 5s</button>
  <button class="debug-btn" onclick="skipTo('monthly')">⏩ Monthly reset in 5s</button>
  <div class="debug-section-label">Theme</div>
  <button class="debug-btn" id="themeToggleBtn" onclick="toggleLightMode()">☀️ Light mode</button>
  <div class="debug-section-label">Danger zone</div>
  <button class="debug-btn danger" onclick="resetAll()">↺ Reset all data</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  QUEST POOLS
// ═══════════════════════════════════════════════════════════════════

const DAILY_POOL = [
  // ── movement & outdoors ──
  "Walk 2–4 miles outdoors","Go for a bike ride around your neighborhood","Swim laps or go for an open-water swim","Complete a 30-min bodyweight workout","Go for a hike on a local trail","Play a sport for 30+ minutes","Play a round of disc golf","Jump rope for 20 minutes straight","Do a full yoga session using a free YouTube video","Run a 5K or longer","Skateboard or rollerblade for 30+ mins","Do 100 pushups spread throughout the day","Do 100 squats throughout the day","Walk every road in your neighborhood you've never been on","Go outside and throw a frisbee or ball for 30 mins","Do a stair workout — find the tallest stairs nearby","Spend 30 mins doing handstand or balance practice","Walk to somewhere at least 1 mile away and back","Do a sprint workout at a park or field","Try a calisthenics routine from YouTube","Go barefoot outside for at least 30 mins","Explore a trail you've never hiked before","Do 10 sets of 10 pullups throughout the day","Try slack-lining at a park","Ride your bike to a destination instead of driving","Play pickup basketball or soccer at a park","Do a stretching and mobility routine for 45 mins","Go for a morning walk before 8am","Walk along any nearby waterfront, river, or lake","Find the highest hill near you and climb it","Do a plank challenge — hold as long as you can, 5 rounds","Go bird-watching for an hour with a free ID app","Do a balance and coordination drill circuit","Jog somewhere scenic and take in the view","Do 200 bodyweight reps in any combination","Walk at least 10,000 steps today","Sprint up a hill 10 times","Do an outdoor workout using only a park bench","Swim at a lake, river, or public pool","Bike to a viewpoint and sit there for 20 mins","Do 30 mins of jump training — box jumps, broad jumps","Walk backward for a quarter mile","Play catch with someone","Do a nature scavenger hunt — find 10 specific things","Go for a night walk after dark","Try a beginner Tai Chi routine from YouTube","Do a parkour basics tutorial in a park","Make up your own workout and do it for 30 mins","Do a hill repeat workout — find a steep hill and run it 8 times","Do 3 sets of max pushups, pullups, and situps and record your numbers",
  // ── reading & learning ──
  "Read 20 pages of a book","Watch one educational YouTube video and take handwritten notes","Practice a new language for 30 mins using a free app","Practice coding for one hour","Practice an instrument for 30 mins","Learn a new recipe and cook it","Study a topic you've always been curious about","Memorize 20 new vocabulary words in any language","Learn how something mechanical works — read deeply","Read a long Wikipedia article and summarize it in your own words","Learn about a historical event you knew nothing about","Read the news from a country other than the US","Learn the basics of a topic you know nothing about — pick at random","Study a map of your state and memorize geography","Learn to read a star map and identify 10 constellations","Watch a full documentary on YouTube","Learn 10 facts about a country you've never heard of","Study the physics of something you use every day","Read 50 pages of a book","Learn about one native plant or animal from the PNW","Listen to an educational podcast episode and take notes","Learn basic first aid — watch a tutorial and practice","Study the history of your town or county","Learn to identify cloud types and what weather they predict","Learn how your computer or phone works at a basic level","Write a summary of the most interesting book you've ever read","Learn the basics of investing or personal finance","Study a philosophy you've never read about","Learn basic knot-tying — practice 5 knots","Learn how to read a topographic map","Study the life of a historical figure you've never heard of","Learn the periodic table — first 20 elements by memory","Learn basic astronomy — what's visible in the sky this week","Read about a scientific discovery made this year","Learn 10 words in 5 different languages","Study a musical theory concept and apply it","Learn the basics of a coding language you don't know","Read about a famous unsolved mystery","Learn how to do basic car maintenance tasks","Learn to identify edible plants in the PNW const XP = { daily: 100, weekly: 300, monthly: 500, side: 50 };

//  TIME HELPERS (with debug offset)
// ═══════════════════════════════════════════════════════════════════
let timeOffset = 0;
let skipLockUntil = 0;
function now() { return Date.now() + timeOffset; }

function applyTheme(theme) {
  document.body.dataset.theme = theme;
  const icon = theme === 'light' ? '🌙' : '☀️';
  const label = theme === 'light' ? '🌙 Dark mode' : '☀️ Light mode';
  const iconBtn = document.getElementById('themeIconBtn');
  const drawerBtn = document.getElementById('themeToggleBtn');
  if (iconBtn) iconBtn.textContent = icon;
  if (drawerBtn) drawerBtn.textContent = label;
  localStorage.setItem('sq_theme', theme);
}

function toggleLightMode() {
  const next = document.body.dataset.theme === 'light' ? 'dark' : 'light';
  applyTheme(next);
}

function initTheme() {
  const saved = localStorage.getItem('sq_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved || (prefersDark ? 'dark' : 'light'));
}

function startOfDay(t)   { const d=new Date(t); d.setHours(0,0,0,0); return d.getTime(); }
function startOfWeek(t)  { const d=new Date(t); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); d.setHours(0,0,0,0); return d.getTime(); }
function startOfMonth(t) { const d=new Date(t); d.setDate(1); d.setHours(0,0,0,0); return d.getTime(); }
function nextDay(t)   { const reset=state && typeof state.dayKey==='number' ? state.dayKey : startOfDay(t); return reset+86400000; }
function nextWeek(t)  { const reset=state && typeof state.weekKey==='number' ? state.weekKey : startOfWeek(t); return reset+7*86400000; }
function nextMonth(t) { const d=new Date(state && typeof state.monthKey==='number' ? state.monthKey : startOfMonth(now())); d.setMonth(d.getMonth()+1); return d.getTime(); }
function msUntil(target) { return Math.max(0, target - now()); }
function fmt(ms) {
  if(ms<=0) return '0M';
  const s=Math.floor(ms/1000), m=Math.floor(s/60)%60, h=Math.floor(s/3600)%24, d=Math.floor(s/86400);
  if(d>0) return d+'D '+h+'H'; if(h>0) return h+'H '+m+'M'; return m+'M';
}

// ═══════════════════════════════════════════════════════════════════
//  SHUFFLE & PICK
// ═══════════════════════════════════════════════════════════════════
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function pickUnused(pool, usedKey, n) {
  let used=JSON.parse(localStorage.getItem(usedKey)||'[]');
  let avail=pool.filter(q=>!used.includes(q));
  if(avail.length<n){used=[];avail=pool;}
  const picked=shuffle(avail).slice(0,n);
  localStorage.setItem(usedKey,JSON.stringify([...used,...picked]));
  return picked;
}

//  STATE
// ═══════════════════════════════════════════════════════════════════
function loadState() { try{const r=localStorage.getItem('sq_v4');return r?JSON.parse(r):null;}catch(e){return null;} }
function saveState(s) { try{localStorage.setItem('sq_v4',JSON.stringify(s));}catch(e){} }

function initState() {
  let s=loadState();
  const t=now();
  const nowDay=startOfDay(t), nowWeek=startOfWeek(t), nowMonth=startOfMonth(t);
  if(!s) s={xp:0,mainXP:0,missedMainXP:0,sideXP:0,dayKey:0,weekKey:0,monthKey:0,dailyCount:1,weeklyCount:1,monthlyCount:1,daily:[],weekly:[],monthly:[],side:[],dailyDone:[],weeklyDone:[],monthlyDone:[]};
  if(typeof s.xp!=='number') s.xp=0;
  if(typeof s.mainXP!=='number') s.mainXP=Math.max(0,(s.xp||0)-(s.sideXP||0));
  if(typeof s.missedMainXP!=='number') s.missedMainXP=0;
  if(typeof s.sideXP!=='number') s.sideXP=0;
  if(s.sideXP<0) s.sideXP=0;
  if(s.xp<0) s.xp=0;
  if((s.xp||0)<(s.sideXP||0)) s.xp=s.sideXP||0;
  if(!s.dailyCount) s.dailyCount=1;
  if(!s.weeklyCount) s.weeklyCount=1;
  if(!s.monthlyCount) s.monthlyCount=1;
  if(s.dayKey!==nowDay)  {s.dayKey=nowDay; s.daily=pickUnused(DAILY_POOL,'sq_used_daily',3); s.dailyDone=[false,false,false]; s.dailyCount=(s.dailyCount||1)+1;}
  if(s.weekKey!==nowWeek){s.weekKey=nowWeek; s.weekly=pickUnused(WEEKLY_POOL,'sq_used_weekly',3); s.weeklyDone=[false,false,false]; s.weeklyCount=(s.weeklyCount||1)+1;}
  if(s.monthKey!==nowMonth){s.monthKey=nowMonth; s.monthly=pickUnused(MONTHLY_POOL,'sq_used_monthly',3); s.monthlyDone=[false,false,false]; s.monthlyCount=(s.monthlyCount||1)+1;}
  if(!s.side||s.side.length===0){s.side=pickUnused(SIDE_POOL,'sq_used_side',6);}
  return s;
}

let state=initState();
saveState(state);

//  GRADE HELPERS
// ═══════════════════════════════════════════════════════════════════
// Max possible XP from main quests shown right now
function maxMainXP() {
  return 3*XP.daily + 3*XP.weekly + 3*XP.monthly; // 300+900+1500 = 2700
}
function earnedMainXP() {
  return Math.max(0,(state.mainXP||0));
}
function missedMainXPValue() {
  return Math.max(0,(state.missedMainXP||0));
}
function gradeFromPct(pct) {
  if(pct>=90) return {letter:'A',cls:'grade-A'};
  if(pct>=80) return {letter:'B',cls:'grade-B'};
  if(pct>=70) return {letter:'C',cls:'grade-C'};
  if(pct>=60) return {letter:'D',cls:'grade-D'};
  return {letter:'F',cls:'grade-F'};
}

function renderGrade() {
  const mainEarned=earnedMainXP();
  const sideEarned=state.sideXP||0;
  const missed=missedMainXPValue();
  const totalEarned=mainEarned+sideEarned;
  const possible=mainEarned+missed;
  const pct=possible>0?Math.round(totalEarned/possible*100):0;
  const {letter,cls}=gradeFromPct(pct);
  const row=document.getElementById('gradeRow');
  row.innerHTML=`
    <div class="grade-card">
      <span class="grade-label">Grade</span>
      <span class="grade-value grade-letter ${cls}">${letter}</span>
      <span class="grade-sub">${pct}% of total XP potential</span>
    </div>
    <div class="grade-card">
      <span class="grade-label">Main XP</span>
      <span class="grade-value">${mainEarned.toLocaleString()}</span>
      <span class="grade-sub">of ${Math.max(mainEarned+missed,0).toLocaleString()} main possible</span>
    </div>
    <div class="grade-card">
      <span class="grade-label">Extra Credit</span>
      <span class="grade-value" style="color:var(--purple-txt)">${sideEarned.toLocaleString()}</span>
      <span class="grade-sub extra-credit">+${sideEarned} XP from side quests</span>
    </div>
    <div class="grade-card">
      <span class="grade-label">Total XP</span>
      <span class="grade-value">${totalEarned.toLocaleString()}</span>
      <span class="grade-sub">main + side quests</span>
    </div>`;
}

function checkResets() {
  if(now() < skipLockUntil) return;
  const t=now();
  const nowDay=startOfDay(t), nowWeek=startOfWeek(t), nowMonth=startOfMonth(t);
  let changed=false;
  if(state.dayKey!==nowDay)  {state.missedMainXP=(state.missedMainXP||0)+((state.dailyDone||[]).filter(v=>!v).length*XP.daily); state.dayKey=nowDay; state.dayResetAt=t; state.daily=pickUnused(DAILY_POOL,'sq_used_daily',3); state.dailyDone=[false,false,false]; state.dailyCount=(state.dailyCount||1)+1; changed=true;}
  if(state.weekKey!==nowWeek){state.missedMainXP=(state.missedMainXP||0)+((state.weeklyDone||[]).filter(v=>!v).length*XP.weekly); state.weekKey=nowWeek; state.weekResetAt=t; state.weekly=pickUnused(WEEKLY_POOL,'sq_used_weekly',3); state.weeklyDone=[false,false,false]; state.weeklyCount=(state.weeklyCount||1)+1; changed=true;}
  if(state.monthKey!==nowMonth){state.missedMainXP=(state.missedMainXP||0)+((state.monthlyDone||[]).filter(v=>!v).length*XP.monthly); state.monthKey=nowMonth; state.monthResetAt=t; state.monthly=pickUnused(MONTHLY_POOL,'sq_used_monthly',3); state.monthlyDone=[false,false,false]; state.monthlyCount=(state.monthlyCount||1)+1; changed=true;}
  if(changed){saveState(state); renderMain(); renderGrade();}
}

function renderMain() {
  const cols=document.getElementById('mainCols'); cols.innerHTML='';
  const t=now();
  const sections=[
    {title:'Daily Quests', cd:'cd-daily',   msLeft:msUntil(nextDay(t)),   quests:state.daily,   done:state.dailyDone,   xpClass:'xp-daily',   xpAmt:XP.daily,   key:'daily'},
    {title:'Weekly Quests',cd:'cd-weekly',  msLeft:msUntil(nextWeek(t)),  quests:state.weekly,  done:state.weeklyDone,  xpClass:'xp-weekly',  xpAmt:XP.weekly,  key:'weekly'},
    {title:'Monthly Quests',cd:'cd-monthly',msLeft:msUntil(nextMonth(t)), quests:state.monthly, done:state.monthlyDone, xpClass:'xp-monthly', xpAmt:XP.monthly, key:'monthly'},
  ];
  sections.forEach(sec=>{
    const col=document.createElement('div'); col.className='section';
    col.innerHTML=`<div class="section-header"><span class="section-title">${sec.title}</span><span class="countdown ${sec.cd}">⏱ ${fmt(sec.msLeft)}</span></div>`;
    sec.quests.forEach((q,i)=>{
      const div=document.createElement('div');
      div.className='quest-card'+(sec.done[i]?' done':'');
      div.innerHTML=`<div class="quest-check">${sec.done[i]?'✓':''}</div><span class="quest-text">${q}</span><span class="quest-xp ${sec.xpClass}">⚡ ${sec.xpAmt}</span>`;
      if(sec.done[i]) div.querySelector('.quest-check').style.cssText='background:var(--green);border-color:var(--green);color:#fff;';
      if(!sec.done[i]){
        div.addEventListener('click',()=>{
          state[sec.key+'Done'][i]=true;
          state.mainXP+=sec.xpAmt;
          state.xp+=sec.xpAmt;
          saveState(state);
          showToast('+'+sec.xpAmt+' XP! Quest complete!');
          renderGrade();
          renderMain();
        });
      }
      col.appendChild(div);
    });
    cols.appendChild(col);
  });
}

function swapSideCard(slot) {
  const card=document.getElementById('sq-'+slot);
  if(!card||card.dataset.animating==='1') return;
  card.dataset.animating='1';
  card.style.animation='fadeSlideOut 0.35s ease forwards';
  card.style.pointerEvents='none';

  setTimeout(()=>{
    const next=pickUnused(SIDE_POOL,'sq_used_side',1)[0];
    state.side[slot]=next;
    saveState(state);

    // fully reset card state
    card.className='quest-card';
    card.style.animation='';
    card.style.opacity='';
    card.style.transform='';
    card.style.pointerEvents='';

    const chk=card.querySelector('.quest-check');
    chk.textContent='';
    chk.style.cssText='';

    const txt=card.querySelector('.quest-text');
    txt.textContent=next;
    txt.style.cssText='';

    card.style.animation='fadeSlideIn 0.35s ease forwards';
    setTimeout(()=>{
      card.style.animation='';
      card.dataset.animating='0';
      card.onclick=()=>completeSideQuest(slot);
    },360);

    updateSideInfo();
  },370);
}

function completeSideQuest(slot) {
  const card=document.getElementById('sq-'+slot);
  if(!card||card.dataset.animating==='1'||card.classList.contains('done')) return;

  card.classList.add('done');
  card.onclick=null;
  const chk=card.querySelector('.quest-check');
  chk.textContent='✓';
  chk.style.cssText='background:var(--green);border-color:var(--green);color:#fff;';

  state.sideXP+=XP.side;
  state.xp+=XP.side;
  saveState(state);
  showToast('+'+XP.side+' XP! Side quest done! (extra credit)');
  renderGrade();

  setTimeout(()=>swapSideCard(slot), 700);
}

function renderSide() {
  const grid=document.getElementById('sideGrid'); grid.innerHTML='';
  state.side.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='quest-card';
    div.id='sq-'+i;
    div.dataset.animating='0';
    div.innerHTML=`<div class="quest-check"></div><span class="quest-text">${q}</span><span class="quest-xp xp-side">⚡ ${XP.side} (EC)</span>`;
    div.onclick=()=>completeSideQuest(i);
    grid.appendChild(div);
  });
  updateSideInfo();
}

function updateSideInfo() {
  const used=JSON.parse(localStorage.getItem('sq_used_side')||'[]');
  const rem=Math.max(0,SIDE_POOL.length-used.length);
  document.getElementById('sidePoolInfo').textContent=`${rem} of ${SIDE_POOL.length} unique side quests remaining`;
}

// ═══════════════════════════════════════════════════════════════════
//  DEBUG
// ═══════════════════════════════════════════════════════════════════
function openDebug() {
  document.getElementById('debugDrawer').classList.add('open');
  document.getElementById('debugOverlay').classList.add('open');
}
function closeDebug() {
  document.getElementById('debugDrawer').classList.remove('open');
  document.getElementById('debugOverlay').classList.remove('open');
}

function skipTo(type){
  const t=now();
  let advanceMs=0;
  if(type==='daily') advanceMs=Math.max(0, nextDay(t)-t-5000);
  if(type==='weekly') advanceMs=Math.max(0, nextWeek(t)-t-5000);
  if(type==='monthly') advanceMs=Math.max(0, nextMonth(t)-t-5000);
  if(advanceMs<=0) return;
  skipLockUntil=now()+5000;
  timeOffset+=advanceMs;
  saveState(state);
  showToast('Time skipped — '+type+' resets in 5s');
  renderMain();
  renderGrade();
  setTimeout(()=>{ checkResets(); renderMain(); renderGrade(); }, 6000);
}

function resetAll(){
  localStorage.removeItem('sq_v4');
  localStorage.removeItem('sq_used_daily');
  localStorage.removeItem('sq_used_weekly');
  localStorage.removeItem('sq_used_monthly');
  localStorage.removeItem('sq_used_side');
  timeOffset=0;
  state=initState();
  saveState(state);
  renderGrade(); renderMain(); renderSide();
  showToast('All data reset');
  closeDebug();
}


// ═══════════════════════════════════════════════════════════════════
//  DAILY TASKS
// ═══════════════════════════════════════════════════════════════════

function loadTasks() {
  try { return JSON.parse(localStorage.getItem('sq_tasks') || '[]'); } catch(e) { return []; }
}
function saveTasks(tasks) {
  try { localStorage.setItem('sq_tasks', JSON.stringify(tasks)); } catch(e) {}
}
function taskDoneKey() {
  return 'sq_taskdone_' + (state ? state.dayKey : 0);
}
function loadTaskDone() {
  try { return JSON.parse(localStorage.getItem(taskDoneKey()) || '{}'); } catch(e) { return {}; }
}
function saveTaskDone(done) {
  try { localStorage.setItem(taskDoneKey(), JSON.stringify(done)); } catch(e) {}
  try {
    const prefix = 'sq_taskdone_';
    const cur = taskDoneKey();
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix) && k !== cur) localStorage.removeItem(k);
    }
  } catch(e) {}
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = (input.value || '').trim();
  if (!text) return;
  const tasks = loadTasks();
  tasks.push({ id: Date.now().toString(), text });
  saveTasks(tasks);
  input.value = '';
  renderTasks();
  input.focus();
}

function deleteTask(id) {
  saveTasks(loadTasks().filter(t => t.id !== id));
  const done = loadTaskDone();
  delete done[id];
  saveTaskDone(done);
  renderTasks();
}

function toggleTask(id) {
  const done = loadTaskDone();
  done[id] = !done[id];
  saveTaskDone(done);
  renderTasks();
}

function renderTasks() {
  const list = document.getElementById('tasksList');
  const info = document.getElementById('tasksInfo');
  const cd   = document.getElementById('tasksCountdown');
  if (!list) return;

  if (cd) cd.textContent = '⏱ ' + fmt(msUntil(nextDay(now())));

  const tasks = loadTasks();
  const done  = loadTaskDone();

  if (tasks.length === 0) {
    list.innerHTML = '<div class="tasks-empty">No tasks yet.<br>Tap <strong>+</strong> to add your first daily task.</div>';
    if (info) info.textContent = '';
    return;
  }

  list.innerHTML = '';
  const sorted = [...tasks].sort((a, b) => (done[a.id]?1:0) - (done[b.id]?1:0));

  sorted.forEach(task => {
    const isDone = !!done[task.id];
    const div = document.createElement('div');
    div.className = 'task-card' + (isDone ? ' done' : '');

    const chk = document.createElement('div');
    chk.className = 'task-check';
    chk.textContent = isDone ? '✓' : '';
    if (isDone) chk.style.cssText = 'background:var(--green);border-color:var(--green);color:#fff;';
    chk.addEventListener('click', () => toggleTask(task.id));

    const txt = document.createElement('span');
    txt.className = 'task-text';
    txt.textContent = task.text;
    txt.addEventListener('click', () => toggleTask(task.id));

    const del = document.createElement('button');
    del.className = 'task-delete';
    del.innerHTML = '&times;';
    del.title = 'Remove task';
    del.addEventListener('click', e => { e.stopPropagation(); deleteTask(task.id); });

    div.appendChild(chk);
    div.appendChild(txt);
    div.appendChild(del);
    list.appendChild(div);
  });

  const doneCount = tasks.filter(t => done[t.id]).length;
  if (info) info.textContent = doneCount + ' of ' + tasks.length + ' tasks completed today';
}

// ═══════════════════════════════════════════════════════════════════
//  TABS & INIT
// ═══════════════════════════════════════════════════════════════════
function setTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='main'&&i===0)||(tab==='side'&&i===1)));
  document.getElementById('mainView').style.display=tab==='main'?'':'none';
  document.getElementById('sideView').style.display=tab==='side'?'':'none';
}

initTheme();
renderGrade();
renderMain();
renderSide();
renderTasks();
renderTasks();
setInterval(()=>{ checkResets(); renderMain(); renderGrade(); const cd=document.getElementById('tasksCountdown'); if(cd) cd.textContent='⏱ '+fmt(msUntil(nextDay(now()))); }, 1000);
</script>
